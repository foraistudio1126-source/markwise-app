<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="102" fill="#1a1a2e"/>
  <!-- Book shape -->
  <g transform="translate(256,256)" fill="none" stroke="#4a5568" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-21,-107 L-133,-80 L-133,93 L-21,67 Z" fill="#4a5568" opacity="0.4"/>
    <!-- Right page -->
    <path d="M21,-107 L133,-80 L133,93 L21,67 Z" fill="#4a5568" opacity="0.4"/>
    <!-- Spine / M shape -->
    <path d="M-21,-107 L-21,67 L0,53 L21,67 L21,-107 L0,-93 Z" fill="#5a6a7a" opacity="0.5"/>
    <!-- Book cover edges -->
    <path d="M-147,-67 L-147,112 L0,80 L147,112 L147,-67" stroke="#4a5568" stroke-width="11" fill="none"/>
    <!-- Bottom curve -->
    <path d="M-147,112 C-80,93 -27,80 0,80 C27,80 80,93 147,112" stroke="#4a5568" stroke-width="11" fill="none"/>
    <!-- # symbol -->
    <text x="-21" y="-48" text-anchor="middle" font-family="monospace" font-size="59" font-weight="bold" fill="#3a4a5a">#</text>
    <!-- * symbol -->
    <text x="21" y="48" text-anchor="middle" font-family="monospace" font-size="64" font-weight="bold" fill="#3a4a5a">*</text>
  </g>
</svg>
