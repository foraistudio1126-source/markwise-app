<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="38" fill="#1a1a2e"/>
  <!-- Book shape -->
  <g transform="translate(96,96)" fill="none" stroke="#4a5568" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M-8,-40 L-50,-30 L-50,35 L-8,25 Z" fill="#4a5568" opacity="0.4"/>
    <!-- Right page -->
    <path d="M8,-40 L50,-30 L50,35 L8,25 Z" fill="#4a5568" opacity="0.4"/>
    <!-- Spine / M shape -->
    <path d="M-8,-40 L-8,25 L0,20 L8,25 L8,-40 L0,-35 Z" fill="#5a6a7a" opacity="0.5"/>
    <!-- Book cover edges -->
    <path d="M-55,-25 L-55,42 L0,30 L55,42 L55,-25" stroke="#4a5568" stroke-width="4" fill="none"/>
    <!-- Bottom curve -->
    <path d="M-55,42 C-30,35 -10,30 0,30 C10,30 30,35 55,42" stroke="#4a5568" stroke-width="4" fill="none"/>
    <!-- # symbol -->
    <text x="-8" y="-18" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#3a4a5a">#</text>
    <!-- * symbol -->
    <text x="8" y="18" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#3a4a5a">*</text>
  </g>
</svg>
